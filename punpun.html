<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technobright Education - Punpun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0fdfa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #ccfbf1; }
        .header { background: #0891b2; padding: 25px 20px; color: white; text-align: center; }
        .header h2 { font-size: 1.1rem; margin-bottom: 5px; font-weight: 600; }
        .stars { color: #fbbf24; font-size: 1.1rem; margin-bottom: 8px; }
        .location { font-size: 0.8rem; opacity: 0.9; }
        .content { padding: 25px 20px; text-align: center; }
        .review-container { background: #f0f9ff; border: 1.5px dashed #0891b2; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: left; min-height: 100px; display: flex; align-items: center; }
        #review-box { color: #164e63; font-size: 0.95rem; line-height: 1.5; font-style: italic; width: 100%; }
        .btn { background: #0891b2; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn.copied { background: #f97316 !important; }
        .status-msg { display: none; color: #0891b2; font-size: 0.8rem; margin-top: 10px; font-weight: 600; }
        .footer-text { font-size: 0.7rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="stars">★★★★★</div>
        <h2>TECHNOBRIGHT EDUCATION</h2>
        <div class="location">📍 Punpun, Patna</div>
    </div>
    <div class="content">
        <div class="review-container">
            <div id="review-box">Smart review loading...</div>
        </div>
        <button id="main-btn" class="btn" onclick="copyAndGo()">
            <span id="btn-icon">📋</span> <span id="btn-text">Copy Review & Open Maps</span>
        </button>
        <div id="status" class="status-msg">✔ Copied! Redirecting to Google Maps...</div>
        <div class="footer-text">Advanced AI Randomizer System</div>
    </div>
</div>

<script>
    // Sentence Spinner Logic
    const parts = {
        shuruat: [
            "Punpun me computer seekhne ke liye",
            "Agar computer sikhna hai toh",
            "Technobright Education",
            "Punpun area ka sabse badhiya",
            "Mere hisab se Punpun me"
        ],
        tareef: [
            "Technobright sabse best coaching hai.",
            "is institute se achi jagah nahi milegi.",
            "computer center bahut hi top quality ka hai.",
            "Sanjeev sir ka teaching style ekdam mast hai.",
            "yahan ki padhai bilkul practical based hai."
        ],
        extra: [
            "Sanjeev sir har doubt ko bahut simple tarike se samjhate hain.",
            "Yahan girls ki safety aur discipline ka pura dhyan rakha jata hai.",
            "ADIT aur Tally ke liye yahan ka environment bahut positive hai.",
            "Practical lab me har student ko apna pc milta hai practice ke liye.",
            "Railway station ke ekdam paas hai toh aane-jane me problem nahi hoti.",
            "Website support aur smart classes se padhna bahut easy ho gaya hai."
        ],
        ant: [
            "Must join for better future!",
            "Highly recommended to everyone.",
            "Sahi me 5 star wali coaching hai.",
            "Thank you Sanjeev sir for best guidance.",
            "I am very satisfied with the classes here."
        ]
    };

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function generateUltraReview() {
        let dice = Math.random();
        // Variety 1: Shuruat + Tareef + Ant
        if (dice < 0.4) {
            return pick(parts.shuruat) + " " + pick(parts.tareef) + " " + pick(parts.ant);
        } 
        // Variety 2: Extra + Ant (Seedha Point par)
        else if (dice < 0.7) {
            return pick(parts.extra) + " " + pick(parts.ant);
        }
        // Variety 3: Tareef + Extra + Ant (Lamba Review)
        else {
            return pick(parts.tareef) + " " + pick(parts.extra) + " " + pick(parts.ant);
        }
    }

    document.getElementById('review-box').innerText = generateUltraReview();

    function copyAndGo() {
        const text = document.getElementById('review-box').innerText;
        const btn = document.getElementById('main-btn');
        navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            document.getElementById('btn-icon').innerText = "✔";
            document.getElementById('btn-text').innerText = "Copied!";
            document.getElementById('status').style.display = "block";
            setTimeout(() => {
                window.location.href = "https://search.google.com/local/writereview?placeid=ChIJHWAuKgOp8jkRVTqHoIUqYS0";
            }, 1800);
        });
    }
</script>
</body>
</html>
