<script>
    // 8 Start + 8 Features + 8 Endings = 512 UNIQUE COMBINATIONS!
    const start = ["Best computer academy in Kurthaul!", "Sanjeev sir ki teaching style bahut achi hai.", "Great place to learn computer.", "Future Boost is the best institute.", "Highly satisfied with the classes.", "Best computer center in Patna.", "Amazing learning experience here.", "Sanjeev sir explains everything so well."];
    
    const features = ["Projector se padhai hone ke karan jaldi samajh aata hai.", "Animation videos se concept bilkul clear ho jate hain.", "Website support aur online test ki suvidha bahut badiya hai.", "Notes aur online portal se padhna bahut easy ho gaya hai.", "Lab aur classroom bahut hi advanced hain.", "Practical classes aur theory dono par focus hota hai.", "Doubt classes aur support system bahut acha hai.", "Modern technology se padhne ka maza hi kuch aur hai."];
    
    const end = ["Must join if you want to learn computer!", "Best experience ever. 5 Stars!", "Thanks to Sanjeev sir for the support.", "Sahi mein Patna ka best computer center hai.", "Strongly recommended for everyone!", "I am very happy with my progress here.", "Value for money and great education.", "Do visit if you are looking for computer courses."];

    function generateReview() {
        let s = start[Math.floor(Math.random() * start.length)];
        let f = features[Math.floor(Math.random() * features.length)];
        let e = end[Math.floor(Math.random() * end.length)];
        return s + " " + f + " " + e; // Bina quotes ke clean text
    }

    const cleanReview = generateReview();
    document.getElementById('review-box').innerText = cleanReview;

    function copyAndGo() {
        const text = document.getElementById('review-box').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Review Copy Ho Gaya! ✅\n\nAb Maps par 5-Star dekar Paste karein.");
            window.location.href = "https://search.google.com/local/writereview?placeid=ChIJ439J8Lin8jkRV6XkcLqOpdA";
        });
    }
</script>
