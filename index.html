<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Boost Academy - Review</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        /* Main Card */
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Blue Header - Exactly like your photo */
        .header { background: #1a56db; padding: 25px 20px; color: white; text-align: center; position: relative; }
        .header h2 { font-size: 1.2rem; margin-bottom: 5px; font-weight: 600; }
        .stars { color: #ffbc00; font-size: 1.2rem; margin-bottom: 8px; }
        .location { font-size: 0.85rem; opacity: 0.9; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        /* Review Text Box */
        .content { padding: 25px 20px; }
        .review-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; position: relative; margin-bottom: 20px; }
        .review-container::before { content: '“'; position: absolute; left: 10px; top: 0; font-size: 40px; color: #cbd5e1; font-family: serif; }
        #review-box { color: #334155; font-size: 1rem; line-height: 1.6; font-style: italic; position: relative; z-index: 1; }
        
        /* Blue Button */
        .btn { background: #1a56db; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn:hover { background: #1e429f; }
        .btn:active { transform: scale(0.98); }
        .footer-text { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="stars">★★★★★</div>
        <h2>Future Boost Computer Academy</h2>
        <div class="location">📍 Kurthaul, Patna</div>
    </div>
    
    <div class="content">
        <div class="review-container">
            <div id="review-box">Generating your unique AI review...</div>
        </div>

        <button class="btn" onclick="copyAndGo()">
            <span>📋</span> Copy Review & Continue
        </button>
        
        <div class="footer-text">Powered by Future Boost AI Support</div>
    </div>
</div>

<script>
    const start = ["Best computer academy in Kurthaul!", "Sanjeev sir ki teaching style bahut achi hai.", "Great place to learn computer.", "Future Boost is the best institute.", "Best computer center in Patna.", "Amazing learning experience here."];
    const features = ["Projector se padhai hone ke karan jaldi samajh aata hai.", "Animation videos se concept bilkul clear ho jate hain.", "Website support aur online test ki suvidha bahut badiya hai.", "Notes aur online portal se padhna bahut easy ho gaya hai.", "Modern technology se padhne ka maza hi kuch aur hai."];
    const end = ["Must join if you want to learn computer!", "Best experience ever. 5 Stars!", "Thanks to Sanjeev sir for the support.", "Sahi mein Patna ka best computer center hai.", "Strongly recommended for everyone!"];

    function generateReview() {
        let s = start[Math.floor(Math.random() * start.length)];
        let f = features[Math.floor(Math.random() * features.length)];
        let e = end[Math.floor(Math.random() * end.length)];
        return s + " " + f + " " + e;
    }

    const cleanReview = generateReview();
    document.getElementById('review-box').innerText = cleanReview;

    function copyAndGo() {
        const text = document.getElementById('review-box').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Review Copy Ho Gaya! ✅\n\nAb Maps par Paste karein.");
            window.location.href = "https://search.google.com/local/writereview?placeid=ChIJ439J8Lin8jkRV6XkcLqOpdA";
        });
    }
</script>

</body>
</html>
