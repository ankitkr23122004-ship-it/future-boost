<script>
    // Institute Specific AI Logic
    const start = ["Best computer academy in Kurthaul!", "Sanjeev sir ki teaching style bahut achi hai.", "Great place to learn computer.", "Future Boost is the best institute.", "Highly satisfied with the classes."];
    const features = ["Projector se padhai hone ke karan jaldi samajh aata hai.", "Animation videos se concept bilkul clear ho jate hain.", "Website support aur online test ki suvidha bahut badiya hai.", "Notes aur online portal se padhna bahut easy ho gaya hai.", "Lab aur classroom bahut hi advanced hain."];
    const end = ["Must join if you want to learn computer!", "Best experience ever. 5 Stars!", "Thanks to Sanjeev sir for the support.", "Sahi mein Patna ka best computer center hai.", "Strongly recommended for everyone!"];

    function generateReview() {
        let s = start[Math.floor(Math.random() * start.length)];
        let f = features[Math.floor(Math.random() * features.length)];
        let e = end[Math.floor(Math.random() * end.length)];
        return `${s} ${f} ${e}`;
    }

    // YAHAN SE QUOTES HATA DIYE GAYE HAIN
    const cleanReview = generateReview();
    document.getElementById('review-box').innerText = cleanReview;

    function copyAndGo() {
        const text = document.getElementById('review-box').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Review Copy Ho Gaya! ✅\n\nAb 5-Star dekar Paste karein.");
            window.location.href = "https://search.google.com/local/writereview?placeid=ChIJ439J8Lin8jkRV6XkcLqOpdA";
        });
    }
</script>
