<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Boost Academy - Review</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .header { background: #1a56db; padding: 25px 20px; color: white; text-align: center; }
        .header h2 { font-size: 1.2rem; margin-bottom: 5px; font-weight: 600; }
        .stars { color: #ffbc00; font-size: 1.2rem; margin-bottom: 8px; }
        .location { font-size: 0.85rem; opacity: 0.9; }
        .content { padding: 25px 20px; text-align: center; }
        .review-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: left; min-height: 120px; display: flex; align-items: center; }
        #review-box { color: #334155; font-size: 0.95rem; line-height: 1.6; font-style: italic; width: 100%; }
        .btn { background: #1a56db; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease; }
        .btn.copied { background: #ff7043 !important; }
        .status-msg { display: none; color: #2e7d32; font-size: 0.85rem; margin-top: 10px; font-weight: 600; }
        .footer-text { font-size: 0.75rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="stars">★★★★★</div>
        <h2>Future Boost Computer Academy</h2>
        <div class="location">📍 Kurthaul-Parsa Road, Patna</div>
    </div>
    <div class="content">
        <div class="review-container">
            <div id="review-box">System is generating your unique feedback...</div>
        </div>
        <button id="main-btn" class="btn" onclick="copyAndGo()">
            <span id="btn-icon">📋</span> <span id="btn-text">Copy Review & Continue</span>
        </button>
        <div id="status" class="status-msg">● Redirecting to Google Maps ●</div>
        <div class="footer-text">Powered by Future Boost AI System</div>
    </div>
</div>

<script>
    const intro = [
        "Future Boost Academy Kurthaul, Parsa aur Sipara ke students ke liye best choice hai.",
        "Agar aap Patna me Kurthaul road par rehte hain toh computer seekhne ke liye ye trusted jagah hai.",
        "Parsa-Sipara area me isse behtar environment aur location wala institute dusra nahi hai.",
        "Kurthaul market me ye computer center apni high-quality education ke liye jana jata hai."
    ];

    const topics = [
        "Yahan theory se zyada Practical Knowledge par focus kiya jata hai, jo job ke liye bahut zaroori hai.",
        "Girls Safety ke maamle me ye Patna ka sabse safe aur disciplined institute hai, environment bahut acha hai.",
        "Yahan ADIT, DCA, Tally aur AI jaise modern courses bahut hi kam fees me sikhaye jate hain.",
        "Sanjeev Sir ki teaching aur unka personal guidance students ko career me bahut help karta hai.",
        "Smart class aur modern computers ke sath yahan practical karne ka experience bahut hi badiya hai.",
        "Sabse achi baat yahan ki Punctuality aur Discipline hai, jo students ko serious banati hai.",
        "Yahan ke courses industry-ready hain aur AI modules ne padhai ko aur bhi advanced bana diya hai."
    ];

    const conclusion = [
        "Girls ke liye ye sabse safe aur best computer center hai. Must join!",
        "Practical seekhna hai toh yahan zaroor aayein. Highly recommended!",
        "Parsa-Kurthaul area ka number 1 center, 5 stars from my side!",
        "Best teachers and best facility in Patna. Very satisfied!",
        "Future Boost is truly the best for computer courses."
    ];

    function generateFinalReview() {
        let p1 = intro[Math.floor(Math.random() * intro.length)];
        let p3 = conclusion[Math.floor(Math.random() * conclusion.length)];
        
        // Pick 1 or 2 random topics for variable length
        let count = Math.floor(Math.random() * 2) + 1; 
        let selectedTopics = [];
        let tempTopics = [...topics];
        
        for(let i=0; i<count; i++) {
            let index = Math.floor(Math.random() * tempTopics.length);
            selectedTopics.push(tempTopics.splice(index, 1));
        }
        
        return p1 + " " + selectedTopics.join(" ") + " " + p3;
    }

    document.getElementById('review-box').innerText = generateFinalReview();

    function copyAndGo() {
        const text = document.getElementById('review-box').innerText;
        const btn = document.getElementById('main-btn');
        navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            document.getElementById('btn-icon').innerText = "✔";
            document.getElementById('btn-text').innerText = "Copied! Redirecting...";
            document.getElementById('status').style.display = "block";
            setTimeout(() => {
                window.location.href = "https://search.google.com/local/writereview?placeid=ChIJ439J8Lin8jkRV6XkcLqOpdA";
            }, 1800);
        });
    }
</script>
</body>
</html>
